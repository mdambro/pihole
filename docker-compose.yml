services:

  unbound:
    container_name: unbound
    image: alpinelinux/unbound:latest
    restart: unless-stopped
    volumes:
      # Mapeas un archivo físico que vive en la carpeta protegida 'files'
      - "../files/unbound/unbound.conf:/etc/unbound/unbound.conf"

  pihole:
    container_name: pihole
    image: pihole/pihole:latest
    restart: unless-stopped
    depends_on:
      - unbound
    ports:
      - "53:53/tcp"
      - "53:53/udp"
    env_file:
      - .env
    volumes:
      - pihole_data:/etc/pihole/

volumes:
  pihole_data:
    name: pihole_data_volume
